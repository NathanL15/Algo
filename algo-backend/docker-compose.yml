services:
  backend:
    build: .
    depends_on:
      - redis
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EMBEDDING_DIM=3072
      - RAG_TOP_K=3
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm start

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"